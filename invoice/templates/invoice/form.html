<!DOCTYPE html>
<html>
<head>
    <title>Create Invoice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 25px;
            width: 400px;
            border-radius: 8px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            font-size: 16px;
        }
        button {
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Create Invoice</h2>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Customer name" required>

        <input type="email" name="email" placeholder="Customer email" required>

        <input type="number" name="amount" placeholder="Amount" required>

        <button type="submit">Create Invoice</button>
    </form>
</div>

</body>
</html>
